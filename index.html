<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=2100, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2100px;
  height: 1200px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
}

/* LABEL (UPDATED) */
.label {
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.2);
}

/* BASE MARKER STYLES */
.marker {
  border-radius: 50%;
  position: relative;
}

/* RED PULSE */
.pulse-red::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background: red;
  animation: pulse 2s infinite;
}

/* ORANGE PULSE */
.pulse-orange::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background: orange;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

let map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([20, 0], 2);

/* MAP */
L.tileLayer(
  `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true
  }
).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

/* SIZE BASED ON MAGNITUDE (SUBTLE SCALING) */
function getSize(mag, base) {
  if (!mag || mag < 2) return base;
  if (mag < 3) return base + 2;
  if (mag < 4) return base + 4;
  if (mag < 5) return base + 6;
  return base + 8;
}

/* CREATE MARKER */
function createMarker(lat, lon, type, mag) {
  let size = 10;

  if (type === "latest") size = getSize(mag, 18);
  else if (type === "secondary") size = getSize(mag, 12);
  else size = getSize(mag, 8);

  let el = document.createElement("div");
  el.className = "marker";

  el.style.width = size + "px";
  el.style.height = size + "px";

  if (type === "latest") {
    el.style.background = "red";
    el.classList.add("pulse-red");
  } else if (type === "secondary") {
    el.style.background = "orange";
    el.classList.add("pulse-orange");
  } else {
    el.style.background = "orange";
  }

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: [size, size]
    })
  });
}

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 20);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;
        let props = f.properties;

        let type = "dot";
        if (index === 0) type = "latest";
        else if (index === 1 || index === 2) type = "secondary";

        let marker = createMarker(
          coords[1],
          coords[0],
          type,
          props.mag
        );

        marker.addTo(markersLayer);

        /* LABEL ONLY FOR LATEST */
        if (index === 0) {
          let mag = props.mag ?? "?";
          let place = props.place || "Unknown";

          marker.bindTooltip(
            `<div class="label">M${mag} — ${place}</div>`,
            {
              permanent: true,
              direction: "top",
              offset: [0, -15]
            }
          ).openTooltip();
        }
      });

    })
    .catch(err => console.log(err));
}

/* INIT */
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
