<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=2100, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2100px;
  height: 1200px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
}

/* LABEL */
.label {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.2);
}

/* RED PULSE (LATEST) */
.pulse-red {
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  position: relative;
}

.pulse-red::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: red;
  animation: pulse 2s infinite;
}

/* ORANGE SMALL PULSE */
.pulse-orange {
  width: 14px;
  height: 14px;
  background: orange;
  border-radius: 50%;
  position: relative;
}

.pulse-orange::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: orange;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* NORMAL DOT */
.dot {
  width: 10px;
  height: 10px;
  background: orange;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

let map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([20, 0], 2);

/* HYBRID MAP (GRID FIXED) */
L.tileLayer(
  `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true
  }
).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

/* CREATE MARKER */
function createMarker(lat, lon, type) {
  let el = document.createElement("div");

  if (type === "latest") el.className = "pulse-red";
  else if (type === "secondary") el.className = "pulse-orange";
  else el.className = "dot";

  let size = 20;
  if (type === "secondary") size = 14;
  if (type === "dot") size = 10;

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: [size, size]
    })
  });
}

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 20);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;
        let props = f.properties;

        let type = "dot";
        if (index === 0) type = "latest";
        else if (index === 1 || index === 2) type = "secondary";

        let marker = createMarker(
          coords[1],
          coords[0],
          type
        );

        marker.addTo(markersLayer);

        /* LABEL ONLY FOR LATEST */
        if (index === 0) {
          let mag = props.mag ?? "?";
          let place = props.place || "Unknown";

          marker.bindTooltip(
            `<div class="label">M${mag} — ${place}</div>`,
            {
              permanent: true,
              direction: "top",
              offset: [0, -15]
            }
          ).openTooltip();
        }
      });

    })
    .catch(err => console.log(err));
}

/* INIT */
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
