<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=1920, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2100px;
  height: 1200px;
  overflow: hidden;
  background: black;
}

/* MAP */
#map {
  width: 100%;
  height: 100%;
}

/* FIX GRID ARTIFACTS (extra safety) */
.leaflet-tile {
  image-rendering: auto;
}

/* PULSE MARKER */
.pulse {
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  position: relative;
}

.pulse::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: red;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(3); opacity: 0; }
  100% { transform: scale(3); opacity: 0; }
}

/* NORMAL MARKER */
.dot {
  width: 10px;
  height: 10px;
  background: orange;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

/* INIT MAP */
let map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([20, 0], 2);

/* HYBRID MAP (FIXED GRID VERSION) */
let tileLayer = L.tileLayer(
  `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true
  }
).addTo(map);

/* DEBUG */
tileLayer.on('tileerror', function() {
  console.log("Tile load error");
});

let markersLayer = L.layerGroup().addTo(map);

/* CREATE MARKER */
function createMarker(lat, lon, isLatest) {
  let el = document.createElement("div");
  el.className = isLatest ? "pulse" : "dot";

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: isLatest ? [20,20] : [10,10]
    })
  });
}

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 10);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;

        let marker = createMarker(
          coords[1],
          coords[0],
          index === 0
        );

        marker.addTo(markersLayer);
      });

    })
    .catch(err => console.log(err));
}

/* INIT */
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
